name: Install

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        run: brew install just

      - name: Run just install
        run: just install

      - name: Smoke test binaries
        run: |
          for cmd in nvim starship bat eza zoxide tmux fzf jq fish; do
            if command -v "$cmd" &>/dev/null; then
              echo "  ok  $cmd ($(command -v $cmd))"
            else
              echo "  FAIL  $cmd not found"
              exit 1
            fi
          done

      - name: Smoke test symlinks
        run: |
          for target in \
            "$HOME/.zshrc" \
            "$HOME/.config/starship.toml" \
            "$HOME/.config/nvim" \
            "$HOME/.tmux.conf" \
            "$HOME/.config/wezterm/wezterm.lua" \
            "$HOME/.yabairc" \
            "$HOME/.skhdrc"; do
            if [ -L "$target" ]; then
              echo "  ok  $target"
            else
              echo "  FAIL  $target is not a symlink"
              echo "  file info: $(ls -la $target 2>&1 || echo 'does not exist')"
              exit 1
            fi
          done

  test-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | bash -s -- --to /usr/local/bin

      - name: Run just install
        run: just install

      - name: Smoke test binaries
        run: |
          # Add paths where tools may have been installed
          export PATH="$PATH:$HOME/.cargo/bin:$HOME/.local/bin:$(go env GOPATH 2>/dev/null)/bin"
          for cmd in nvim starship bat eza zoxide tmux fzf jq fish; do
            if command -v "$cmd" &>/dev/null; then
              echo "  ok  $cmd ($(command -v $cmd))"
            else
              echo "  FAIL  $cmd not found"
              exit 1
            fi
          done

      - name: Smoke test symlinks
        run: |
          for target in \
            "$HOME/.zshrc" \
            "$HOME/.config/starship.toml" \
            "$HOME/.config/nvim" \
            "$HOME/.tmux.conf" \
            "$HOME/.config/wezterm/wezterm.lua"; do
            if [ -L "$target" ]; then
              echo "  ok  $target"
            else
              echo "  FAIL  $target is not a symlink"
              exit 1
            fi
          done
